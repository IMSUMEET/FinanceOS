services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SPEND_DATA_DIR: /data
    volumes:
      - spend_data:/data

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  spend_data:
